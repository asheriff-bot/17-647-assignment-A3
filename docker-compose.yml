# A2 API: Web BFF (80), Mobile BFF (80), Customer service (3000), Book service (3000).
# Local run: backend_router mimics Internal ALB (path-based routing).
# Use: docker compose up -d
# Test Web BFF:  http://localhost:8080/status  (add X-Client-Type: Web, Authorization: Bearer <jwt>)
# Test Mobile BFF: http://localhost:8081/status (add X-Client-Type: iOS, Authorization: Bearer <jwt>)

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bookstore
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro

  customer_service:
    build:
      context: ./customer_service
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: customers_db
      PORT: "3000"
      KAFKA_BROKERS: kafka:9092
      ANDREW_ID: your_andrew_id
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy

  # For live course API instead of mock: set book_service RECOMMENDATION_SERVICE_URL to
  # http://52.73.13.84 (testing) or http://100.51.187.149 (Gradescope) and path
  # RECOMMENDATION_PATH_TEMPLATE=/recommended-titles/isbn/{isbn}
  book_service:
    build:
      context: ./book_service
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: books_db
      PORT: "3000"
      RECOMMENDATION_SERVICE_URL: http://book_recommendation_mock:8080
      RECOMMENDATION_PATH_TEMPLATE: /api/recommendations/{isbn}
      RELATED_BOOKS_TIMEOUT_SECONDS: "3"
      RELATED_BOOKS_CIRCUIT_OPEN_SECONDS: "60"
      CIRCUIT_STATE_FILE: /circuit/circuit_state.json
    volumes:
      - book_circuit_state:/circuit
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  crm_service:
    build:
      context: ./crm_service
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      ANDREW_ID: your_andrew_id
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_STARTTLS: "true"
      SMTP_USERNAME: your_email@gmail.com
      SMTP_PASSWORD: app_password
      SMTP_SENDER_EMAIL: your_email@gmail.com
    depends_on:
      - kafka

  backend_router:
    image: nginx:alpine
    volumes:
      - ./scripts/nginx-backend.conf:/etc/nginx/conf.d/default.conf:ro
    # Do NOT publish host port 3000.
    # BFFs call the router via Docker network (backend_router:3000),
    # and the host may already have something listening on :3000.
    expose:
      - "3000"
    depends_on:
      - customer_service
      - book_service

  web_bff:
    build:
      context: .
      dockerfile: web_bff/Dockerfile
    environment:
      URL_BASE_BACKEND_SERVICES: http://backend_router:3000
      PORT: "80"
    ports:
      - "8080:80"
    depends_on:
      - backend_router

  mobile_bff:
    build:
      context: .
      dockerfile: mobile_bff/Dockerfile
    environment:
      URL_BASE_BACKEND_SERVICES: http://backend_router:3000
      PORT: "80"
    ports:
      - "8081:80"
    depends_on:
      - backend_router

volumes:
  book_circuit_state:
