apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  namespace: bookstore-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: book-service
                topologyKey: kubernetes.io/hostname
      volumes:
        - name: circuit-state
          emptyDir: {}
      containers:
        - name: book-service
          image: YOUR_REGISTRY/book-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: circuit-state
              mountPath: /circuit
          env:
            - name: DB_HOST
              value: YOUR_RDS_ENDPOINT
            - name: DB_USER
              value: YOUR_DB_USER
            - name: DB_PASSWORD
              value: YOUR_DB_PASSWORD
            - name: DB_NAME
              value: books_db
            # Set URL from Canvas: testing http://52.73.13.84 | Gradescope http://100.51.187.149
            - name: RECOMMENDATION_SERVICE_URL
              value: YOUR_RECOMMENDATION_SERVICE_URL
            # Course engine OpenAPI: GET /recommended-titles/isbn/{isbn}
            - name: RECOMMENDATION_PATH_TEMPLATE
              value: /recommended-titles/isbn/{isbn}
            - name: RELATED_BOOKS_TIMEOUT_SECONDS
              value: "3"
            - name: RELATED_BOOKS_CIRCUIT_OPEN_SECONDS
              value: "60"
            - name: CIRCUIT_STATE_FILE
              value: /circuit/circuit_state.json
            - name: PORT
              value: "3000"
          livenessProbe:
            httpGet:
              path: /status
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: book-service
  namespace: bookstore-ns
spec:
  type: ClusterIP
  selector:
    app: book-service
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
