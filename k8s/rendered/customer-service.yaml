apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: customer-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: customer-service
          image: docker.io/akramdocke/customer-service:a3-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: bookstore-db-dev.cluster-cgqb4yinmv3k.us-east-1.rds.amazonaws.com
            - name: DB_USER
              value: admin123
            - name: DB_PASSWORD
              value: admin123
            - name: DB_NAME
              value: customers_db
            - name: KAFKA_BROKERS
              value: 52.73.13.84:9092,100.51.187.149:9092,52.54.87.18:9092
            - name: ANDREW_ID
              value: asheriff
            - name: PORT
              value: "3000"
          livenessProbe:
            httpGet:
              path: /status
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: bookstore-ns
spec:
  type: ClusterIP
  selector:
    app: customer-service
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
