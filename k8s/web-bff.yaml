apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-bff
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-bff
  template:
    metadata:
      labels:
        app: web-bff
    spec:
      containers:
        - name: web-bff
          image: YOUR_REGISTRY/web-bff:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: URL_BASE_BACKEND_SERVICES
              value: http://backend-router:3000
            - name: PORT
              value: "80"
          livenessProbe:
            httpGet:
              path: /status
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-bff
  namespace: bookstore-ns
spec:
  type: LoadBalancer
  selector:
    app: web-bff
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
